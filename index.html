<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows Icon</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #57c2ff, #0b4f91 70%);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    svg { width: min(60vw, 260px); height: auto; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="Windows icon" role="img">
      <rect width="256" height="256" fill="#00A4EF"/>
      <g fill="#FFFFFF">
        <rect x="34" y="34" width="88" height="88"/>
        <rect x="134" y="34" width="88" height="88"/>
        <rect x="34" y="134" width="88" height="88"/>
        <rect x="134" y="134" width="88" height="88"/>
      </g>
    </svg>
  </div>
</body>
</html>
